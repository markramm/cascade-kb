services:
  pyrite:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    volumes:
      - pyrite-data:/data
    environment:
      - PYRITE_HOST=0.0.0.0
      - PYRITE_AUTH_ENABLED=true
      - PYRITE_AUTH_ANONYMOUS_TIER=read
      - PYRITE_CORS_ORIGINS=https://capturecascade.org
      - PYRITE_SEARCH_MODE=hybrid
      - PYRITE_DATA_DIR=/data
    networks:
      - shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pyrite-data:

networks:
  shared:
    name: pyrite-shared
    external: true
