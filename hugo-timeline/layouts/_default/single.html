{{ define "main" }}
<div class="page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="/">Ledger</a>
    {{ with .Parent }}
      {{ if not .IsHome }}
      <span class="sep">›</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ end }}
    {{ end }}
    <span class="sep">›</span>
    <span aria-current="page">{{ .Title }}</span>
  </nav>
  <header class="taxonomy-intro">
    <span class="eyebrow">{{ with .Parent }}{{ .Title }}{{ else }}Page{{ end }}</span>
    <h1>{{ .Title }}</h1>
    {{ with .Params.summary }}<p class="lede">{{ . }}</p>{{ end }}
  </header>
  <div class="event-body" style="padding-top:24px;">
    {{ .Content }}
  </div>
</div>
{{ end }}
